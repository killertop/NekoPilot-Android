name: Build and publish Android release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      build_type:
        description: Build variant to publish
        required: true
        default: qa
        type: choice
        options:
          - qa
          - release
      tag:
        description: Release tag (leave empty to generate one)
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-publish:
    name: Build and publish ${{ github.event_name == 'workflow_dispatch' && inputs.build_type || 'qa' }} APK
    runs-on: ubuntu-latest
    env:
      BUILD_TYPE: ${{ github.event_name == 'workflow_dispatch' && inputs.build_type || 'qa' }}

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Java 17
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Go 1.26.5
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: '1.26.5'
          cache-dependency-path: libcore/go.sum

      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1

      - name: Install Android SDK components
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager \
            "platform-tools" \
            "emulator" \
            "platforms;android-35" \
            "build-tools;35.0.1" \
            "ndk;25.0.8775105" \
            "system-images;android-35;google_apis;x86_64"

      - name: Verify language boundaries
        shell: bash
        run: ./scripts/verify-language-boundaries.sh

      - name: Build native core
        shell: bash
        run: |
          echo "sdk.dir=${ANDROID_HOME}" > local.properties
          echo "ndk.dir=${ANDROID_HOME}/ndk/25.0.8775105" >> local.properties
          ./run lib core

      - name: Verify native AAR boundary
        shell: bash
        run: ./scripts/verify-language-boundaries.sh

      - name: Test native modules
        shell: bash
        run: |
          (cd libcore && go test -race ./...)
          (cd libcore && go vet ./...)

      - name: Create API 35 x86_64 emulator
        timeout-minutes: 5
        shell: bash
        env:
          AVD_NAME: nekopilot-api-35
          SYSTEM_IMAGE: system-images;android-35;google_apis;x86_64
        run: |
          test -x "${ANDROID_HOME}/emulator/emulator"
          test -x "${ANDROID_HOME}/platform-tools/adb"
          test -e /dev/kvm
          sudo chmod a+rw /dev/kvm
          printf 'no\n' | avdmanager create avd \
            --force \
            --name "$AVD_NAME" \
            --package "$SYSTEM_IMAGE" \
            --device pixel_2

      - name: Start emulator with bounded boot wait
        timeout-minutes: 8
        shell: bash
        env:
          AVD_NAME: nekopilot-api-35
          ANDROID_SERIAL: emulator-5554
          BOOT_TIMEOUT_SECONDS: 360
        run: |
          emulator_log="${RUNNER_TEMP}/android-emulator.log"
          nohup "${ANDROID_HOME}/emulator/emulator" \
            -avd "$AVD_NAME" \
            -port 5554 \
            -no-window \
            -noaudio \
            -no-boot-anim \
            -no-snapshot \
            -wipe-data \
            -accel on \
            -gpu swiftshader_indirect \
            -camera-back none \
            -camera-front none \
            </dev/null >"$emulator_log" 2>&1 &
          emulator_pid=$!
          echo "$emulator_pid" > "${RUNNER_TEMP}/android-emulator.pid"

          deadline=$((SECONDS + BOOT_TIMEOUT_SECONDS))
          boot_completed=""
          while ((SECONDS < deadline)); do
            if ! kill -0 "$emulator_pid" 2>/dev/null; then
              echo "Emulator exited before Android completed boot." >&2
              tail -n 200 "$emulator_log" >&2 || true
              exit 1
            fi

            device_state=$(timeout 10 "${ANDROID_HOME}/platform-tools/adb" \
              -s "$ANDROID_SERIAL" get-state 2>/dev/null || true)
            if [ "$device_state" = "device" ]; then
              boot_completed=$(timeout 10 "${ANDROID_HOME}/platform-tools/adb" \
                -s "$ANDROID_SERIAL" shell getprop sys.boot_completed 2>/dev/null |
                tr -d '\r' || true)
              if [ "$boot_completed" = "1" ]; then
                break
              fi
            fi
            sleep 5
          done

          if [ "$boot_completed" != "1" ]; then
            echo "Android did not complete boot within ${BOOT_TIMEOUT_SECONDS}s." >&2
            tail -n 200 "$emulator_log" >&2 || true
            exit 1
          fi

          timeout 10 "${ANDROID_HOME}/platform-tools/adb" -s "$ANDROID_SERIAL" shell input keyevent 82
          timeout 10 "${ANDROID_HOME}/platform-tools/adb" -s "$ANDROID_SERIAL" shell settings put global window_animation_scale 0
          timeout 10 "${ANDROID_HOME}/platform-tools/adb" -s "$ANDROID_SERIAL" shell settings put global transition_animation_scale 0
          timeout 10 "${ANDROID_HOME}/platform-tools/adb" -s "$ANDROID_SERIAL" shell settings put global animator_duration_scale 0
          timeout 10 "${ANDROID_HOME}/platform-tools/adb" devices -l
          device_abi=$(timeout 10 "${ANDROID_HOME}/platform-tools/adb" \
            -s "$ANDROID_SERIAL" shell getprop ro.product.cpu.abi 2>/dev/null |
            tr -d '\r')
          if [ "$device_abi" != "x86_64" ]; then
            echo "Expected x86_64 emulator, got: ${device_abi:-unknown}" >&2
            exit 1
          fi

      - name: Run x86_64 JNI instrumentation gate
        timeout-minutes: 30
        shell: bash
        env:
          ANDROID_SERIAL: emulator-5554
        run: |
          ./gradlew --no-daemon --max-workers=2 --no-parallel \
            -Pnekopilot.abi=x86_64 \
            app:connectedDebugAndroidTest
          result_xml=$(find app/build/outputs/androidTest-results/connected \
            -type f -name 'TEST-*.xml' -print -quit)
          if [ -z "$result_xml" ] ||
            ! grep -q 'classname="io.nekohasekai.sagernet.core.GoDataCoreTest"' "$result_xml"; then
            echo "GoDataCoreTest did not produce a connected-device result." >&2
            exit 1
          fi

      - name: Collect emulator failure diagnostics
        if: failure()
        shell: bash
        env:
          ANDROID_SERIAL: emulator-5554
        run: |
          diagnostics="${RUNNER_TEMP}/android-diagnostics"
          mkdir -p "$diagnostics"
          cp "${RUNNER_TEMP}/android-emulator.log" "$diagnostics/emulator.log" 2>/dev/null || true
          timeout 30 "${ANDROID_HOME}/platform-tools/adb" devices -l \
            > "$diagnostics/adb-devices.txt" 2>&1 || true
          timeout 30 "${ANDROID_HOME}/platform-tools/adb" -s "$ANDROID_SERIAL" shell getprop \
            > "$diagnostics/getprop.txt" 2>&1 || true
          timeout 30 "${ANDROID_HOME}/platform-tools/adb" -s "$ANDROID_SERIAL" shell dumpsys activity processes \
            > "$diagnostics/activity-processes.txt" 2>&1 || true
          timeout 30 "${ANDROID_HOME}/platform-tools/adb" -s "$ANDROID_SERIAL" logcat -d -v threadtime \
            > "$diagnostics/logcat.txt" 2>&1 || true

          echo "===== emulator log (last 200 lines) ====="
          tail -n 200 "$diagnostics/emulator.log" 2>/dev/null || true
          echo "===== device properties ====="
          cat "$diagnostics/getprop.txt" 2>/dev/null || true
          echo "===== logcat (last 500 lines) ====="
          tail -n 500 "$diagnostics/logcat.txt" 2>/dev/null || true
          echo "===== instrumentation result files ====="
          find app/build/outputs/androidTest-results app/build/reports/androidTests \
            -type f -print 2>/dev/null | sort || true

      - name: Upload emulator failure diagnostics
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: android-instrumentation-diagnostics
          path: |
            ${{ runner.temp }}/android-diagnostics
            app/build/outputs/androidTest-results
            app/build/reports/androidTests
          if-no-files-found: warn
          retention-days: 7

      - name: Stop emulator
        if: always()
        shell: bash
        env:
          ANDROID_SERIAL: emulator-5554
        run: |
          if [ -x "${ANDROID_HOME}/platform-tools/adb" ]; then
            timeout 30 "${ANDROID_HOME}/platform-tools/adb" \
              -s "$ANDROID_SERIAL" emu kill || true
          fi
          if [ -f "${RUNNER_TEMP}/android-emulator.pid" ]; then
            emulator_pid=$(cat "${RUNNER_TEMP}/android-emulator.pid")
            kill "$emulator_pid" 2>/dev/null || true
          fi

      - name: Prepare production signing
        if: env.BUILD_TYPE == 'release'
        shell: bash
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          test -n "$RELEASE_KEYSTORE_BASE64"
          mkdir -p .local-signing
          printf '%s' "$RELEASE_KEYSTORE_BASE64" | base64 --decode > .local-signing/nekopilot-release.jks
          chmod 600 .local-signing/nekopilot-release.jks

      - name: Run QA checks and build APK
        if: env.BUILD_TYPE == 'qa'
        shell: bash
        run: |
          ./gradlew --no-daemon --max-workers=2 --no-parallel \
            app:testQaUnitTest app:lintQa app:assembleQa
          apk="$(find app/build/outputs/apk/qa -maxdepth 1 -type f -name '*.apk' -print -quit)"

          test -n "$apk"
          echo "APK_PATH=$apk" >> "$GITHUB_ENV"

      - name: Run release checks and build APK
        if: env.BUILD_TYPE == 'release'
        env:
          LOCAL_PROPERTIES: ${{ secrets.LOCAL_PROPERTIES }}
        shell: bash
        run: |
          ./gradlew --no-daemon --max-workers=2 --no-parallel \
            app:verifyOfficialReleaseReadiness \
            app:testReleaseUnitTest app:lintRelease app:assembleRelease
          apk="$(find app/build/outputs/apk/release -maxdepth 1 -type f -name '*.apk' -print -quit)"

          test -n "$apk"
          echo "APK_PATH=$apk" >> "$GITHUB_ENV"

      - name: Verify packaged native boundary
        shell: bash
        run: ./scripts/verify-language-boundaries.sh

      - name: Choose release tag
        env:
          REQUESTED_TAG: ${{ inputs.tag }}
        shell: bash
        run: |
          if [ -n "$REQUESTED_TAG" ]; then
            tag="$REQUESTED_TAG"
          elif [ "$BUILD_TYPE" = "release" ]; then
            version="$(sed -n 's/^VERSION_NAME=//p' nb4a.properties)"
            tag="v$version"
          else
            tag="nightly-${{ github.run_number }}"
          fi
          if [[ ! "$tag" =~ ^[A-Za-z0-9][A-Za-z0-9._-]{0,63}$ ]]; then
            echo "Invalid release tag" >&2
            exit 1
          fi
          echo "RELEASE_TAG=$tag" >> "$GITHUB_ENV"

      - name: Publish APK to GitHub Releases
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          args=(
            "$RELEASE_TAG"
            "$APK_PATH"
            --repo "$GITHUB_REPOSITORY"
            --title "NekoPilot $RELEASE_TAG"
            --target "$GITHUB_SHA"
            --generate-notes
          )
          if [ "$BUILD_TYPE" = "qa" ]; then
            args+=(--prerelease)
          fi
          gh release create "${args[@]}"

      - name: Remove production signing material
        if: always() && env.BUILD_TYPE == 'release'
        shell: bash
        run: rm -f .local-signing/nekopilot-release.jks
