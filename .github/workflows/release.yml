name: Build and publish Android release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      build_type:
        description: Build variant to publish
        required: true
        default: qa
        type: choice
        options:
          - qa
          - release
      tag:
        description: Release tag (leave empty to generate one)
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-publish:
    name: Build and publish ${{ github.event_name == 'workflow_dispatch' && inputs.build_type || 'qa' }} APK
    runs-on: ubuntu-latest
    env:
      BUILD_TYPE: ${{ github.event_name == 'workflow_dispatch' && inputs.build_type || 'qa' }}

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Java 17
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Go 1.26.5
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: '1.26.5'
          cache-dependency-path: libcore/go.sum

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
        with:
          components: clippy
          targets: aarch64-linux-android

      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1

      - name: Install Android SDK components
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager \
            "platforms;android-35" \
            "build-tools;35.0.1" \
            "ndk;25.0.8775105"

      - name: Build native core
        shell: bash
        run: |
          echo "sdk.dir=${ANDROID_HOME}" > local.properties
          echo "ndk.dir=${ANDROID_HOME}/ndk/25.0.8775105" >> local.properties
          ./run lib core

      - name: Test native modules
        shell: bash
        run: |
          (cd libcore && go test -race ./...)
          cargo test --manifest-path rust/nekodata-core/Cargo.toml --locked
          cargo clippy --manifest-path rust/nekodata-core/Cargo.toml \
            --locked --all-targets -- -D warnings

      - name: Prepare production signing
        if: env.BUILD_TYPE == 'release'
        shell: bash
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          test -n "$RELEASE_KEYSTORE_BASE64"
          mkdir -p .local-signing
          printf '%s' "$RELEASE_KEYSTORE_BASE64" | base64 --decode > .local-signing/nekopilot-release.jks
          chmod 600 .local-signing/nekopilot-release.jks

      - name: Run QA checks and build APK
        if: env.BUILD_TYPE == 'qa'
        shell: bash
        run: |
          ./gradlew --no-daemon --max-workers=2 --no-parallel \
            app:testQaUnitTest app:lintQa app:assembleQa
          apk="$(find app/build/outputs/apk/qa -maxdepth 1 -type f -name '*.apk' -print -quit)"

          test -n "$apk"
          echo "APK_PATH=$apk" >> "$GITHUB_ENV"

      - name: Run release checks and build APK
        if: env.BUILD_TYPE == 'release'
        env:
          LOCAL_PROPERTIES: ${{ secrets.LOCAL_PROPERTIES }}
        shell: bash
        run: |
          ./gradlew --no-daemon --max-workers=2 --no-parallel \
            app:verifyOfficialReleaseReadiness \
            app:testReleaseUnitTest app:lintRelease app:assembleRelease
          apk="$(find app/build/outputs/apk/release -maxdepth 1 -type f -name '*.apk' -print -quit)"

          test -n "$apk"
          echo "APK_PATH=$apk" >> "$GITHUB_ENV"

      - name: Choose release tag
        env:
          REQUESTED_TAG: ${{ inputs.tag }}
        shell: bash
        run: |
          if [ -n "$REQUESTED_TAG" ]; then
            tag="$REQUESTED_TAG"
          elif [ "$BUILD_TYPE" = "release" ]; then
            version="$(sed -n 's/^VERSION_NAME=//p' nb4a.properties)"
            tag="v$version"
          else
            tag="nightly-${{ github.run_number }}"
          fi
          if [[ ! "$tag" =~ ^[A-Za-z0-9][A-Za-z0-9._-]{0,63}$ ]]; then
            echo "Invalid release tag" >&2
            exit 1
          fi
          echo "RELEASE_TAG=$tag" >> "$GITHUB_ENV"

      - name: Publish APK to GitHub Releases
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          args=(
            "$RELEASE_TAG"
            "$APK_PATH"
            --repo "$GITHUB_REPOSITORY"
            --title "NekoPilot $RELEASE_TAG"
            --target "$GITHUB_SHA"
            --generate-notes
          )
          if [ "$BUILD_TYPE" = "qa" ]; then
            args+=(--prerelease)
          fi
          gh release create "${args[@]}"

      - name: Remove production signing material
        if: always() && env.BUILD_TYPE == 'release'
        shell: bash
        run: rm -f .local-signing/nekopilot-release.jks
